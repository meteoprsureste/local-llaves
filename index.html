<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mi Mapa de Localizaciones</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        html, body, #map { margin: 0; padding: 0; width: 100%; height: 100%; }
    </style>
</head>
<body>

    <div id="map"></div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://api.mapbox.com/mapbox.js/plugins/leaflet-omnivore/v0.3.1/leaflet-omnivore.min.js"></script>

    <script>
        const map = L.map('map').setView([0, 0], 2);

        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            attribution: '&copy; OpenStreetMap contributors'
        }).addTo(map);

        // Cargamos el KML usando Omnivore (lo convierte automáticamente a un formato limpio)
        const kmlLayer = omnivore.kml("PRSKeys.kml")
            .on('ready', function() {
                // Ajusta la pantalla a los puntos del mapa automáticamente
                map.fitBounds(kmlLayer.getBounds());

                // Recorremos cada punto cargado
                kmlLayer.eachLayer(function(layer) {
                    // CHIVATO: Esto nos dirá en la consola del navegador qué datos tiene guardados el punto
                    console.log("Datos del punto detectados:", layer.feature.properties);

                    if (layer.feature && layer.feature.properties) {
                        const props = layer.feature.properties;
                        // Buscamos el nombre y la descripción sin importar si están en mayúsculas o minúsculas
                        const name = props.name || props.Name || props.title || "Punto sin nombre";
                        const description = props.description || props.Description || "";

                        const popupContent = `<strong>${name}</strong>${description ? '<br><br>' + description : ''}`;
                        layer.bindPopup(popupContent);
                    }
                });
            })
            .on('error', function(e) {
                console.error("Error crítico cargando el archivo KML:", e);
            })
            .addTo(map);
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mi Mapa de Localizaciones</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        html, body, #map { margin: 0; padding: 0; width: 100%; height: 100%; }

        .info-actualizacion {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            font-size: 12px;
            font-weight: bold;
            padding: 6px 10px;
            background-color: rgba(255, 255, 255, 0.2);
            border-radius: 4px;
            transition: color 0.3s ease;
        }

        .texto-negro {
            color: #000000;
            text-shadow: 1px 1px 1px rgba(255, 255, 255, 0.8);
        }

        .texto-blanco {
            color: #ffffff;
            text-shadow: 1px 1px 2px rgba(0, 0, 0, 0.9);
        }
    </style>
</head>
<body>

    <div id="map"></div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://api.mapbox.com/mapbox.js/plugins/leaflet-omnivore/v0.3.1/leaflet-omnivore.min.js"></script>

    <script>
        window.addEventListener('DOMContentLoaded', () => {
            const CLAVE_CORRECTA = "Sureste94"; 

            const intentoUsuario = prompt("Por favor, introduce la contraseña para ver el mapa:");

            if (intentoUsuario !== CLAVE_CORRECTA) {
                document.body.innerHTML = '<h1 style="text-align:center; margin-top:20%; font-family:sans-serif; color:#d93025;">🚫 Acceso Denegado. Contraseña incorrecta.</h1>';
            } else {
                inicializarMapa();
            }
        });

        function inicializarMapa() {
            // === IMPORTANTE: RECUERDA PONER AQUÍ TUS DATOS DE REPOSITORIO ===
            const GITHUB_USER = "meteoprsureste"; 
            const GITHUB_REPO = "local-llaves"; 

            // Capa 1: OpenStreetMap (Carreteras)
            const osmLayer = L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
                attribution: '© OpenStreetMap contributors'
            });

            // Capa 2: Satélite (Esri World Imagery)
            const satelliteLayer = L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}', {
                attribution: 'Tiles © Esri'
            });

            const map = L.map('map', {
                center: [0, 0],
                zoom: 2,
                layers: [osmLayer]
            });

            const baseMaps = {
                "Mapa de Carreteras": osmLayer,
                "Vista Satélite": satelliteLayer
            };

            L.control.layers(baseMaps, null, { collapsed: false }).addTo(map);

            // Etiqueta de fecha automática inferior izquierda
            const infoControl = L.control({ position: 'bottomleft' });
            infoControl.onAdd = function (map) {
                const div = L.DomUtil.create('div', 'info-actualizacion texto-negro');
                div.id = "fecha-actualizacion";
                div.innerHTML = "Consultando actualización...";
                return div;
            };
            infoControl.addTo(map);

            // API de GitHub para la fecha automática
            const apiEndpoint = `https://api.github.com/repos/${GITHUB_USER}/${GITHUB_REPO}/commits?path=PRSKeys.kml&page=1&per_page=1`;
            fetch(apiEndpoint)
                .then(response => response.json())
                .then(data => {
                    if (data && data.length > 0) {
                        const rawDate = new Date(data[0].commit.committer.date);
                        const dia = String(rawDate.getDate()).padStart(2, '0');
                        const mes = String(rawDate.getMonth() + 1).padStart(2, '0'); 
                        const anio = rawDate.getFullYear();
                        document.getElementById("fecha-actualizacion").innerHTML = `Actualizado el ${dia} ${mes} ${anio}`;
                    } else {
                        document.getElementById("fecha-actualizacion").innerHTML = "Fecha no disponible";
                    }
                })
                .catch(err => {
                    document.getElementById("fecha-actualizacion").innerHTML = "Error al cargar fecha";
                });

            // Control de color para el texto de actualización
            map.on('baselayerchange', function(event) {
                const divInfo = document.querySelector('.info-actualizacion');
                if (!divInfo) return;
                if (event.layer === satelliteLayer) {
                    divInfo.classList.remove('texto-negro');
                    divInfo.classList.add('texto-blanco');
                } else {
                    divInfo.classList.remove('texto-blanco');
                    divInfo.classList.add('texto-negro');
                }
            });


            // ====================================================================
            // 1. NUEVO: CARGAR EL LÍMITE DEL PARQUE (Abajo en el orden visual)
            // ====================================================================
            // Cambia "limite_parque.kml" por el nombre exacto de tu archivo del límite
            const parqueLayer = omnivore.kml("PRSLimite.kml")
                .on('ready', function() {
                    // Aplicamos el estilo transparente a los polígonos del parque
                    parqueLayer.setStyle({
                        color: "#ff3333",      // Color del borde del parque (Rojo intenso, puedes cambiarlo por ejemplo a #1a73e8 para azul)
                        weight: 3,             // Grosor de la línea del borde en píxeles
                        fillColor: "none",     // Sin color de relleno interno
                        fillOpacity: 0         // Opacidad de relleno a 0 (100% transparente)
                    });
                })
                .addTo(map);


            // ====================================================================
            // 2. CARGAR TUS PUNTOS PRINCIPALES (Encima en el orden visual)
            // ====================================================================
            const kmlLayer = omnivore.kml("PRSKeys.kml")
                .on('ready', function() {
                    // Centramos el zoom de la pantalla prioritariamente en tus marcadores
                    map.fitBounds(kmlLayer.getBounds());

                    kmlLayer.eachLayer(function(layer) {
                        if (layer.feature && layer.feature.properties) {
                            const props = layer.feature.properties;
                            const name = props.name || props.Name || props.title || "Punto sin nombre";
                            const description = props.description || props.Description || "";

                            let lat, lng;
                            if (layer.getLatLng) { 
                                lat = layer.getLatLng().lat;
                                lng = layer.getLatLng().lng;
                            } else if (layer.getBounds) { 
                                lat = layer.getBounds().getCenter().lat;
                                lng = layer.getBounds().getCenter().lng;
                            }

                            const googleMapsUrl = `https://www.google.com/maps/dir/?api=1&destination=${lat},${lng}`;
                            
                            const directionsLink = `<br><br><a href="${googleMapsUrl}" target="_blank" style="display: inline-block; background-color: #1a73e8; color: white; padding: 5px 10px; text-decoration: none; border-radius: 4px; font-size: 12px; font-weight: bold;">📍 ¿Cómo llegar?</a>`;

                            const popupContent = `<strong>${name}</strong>${description ? '<br><br>' + description : ''}${directionsLink}`;
                            layer.bindPopup(popupContent);
                        }
                    });
                })
                .addTo(map);
        }
    </script>
</body>
</html>

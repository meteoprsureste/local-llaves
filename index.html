<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mi Mapa de Localizaciones</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        html, body, #map { margin: 0; padding: 0; width: 100%; height: 100%; }
    </style>
</head>
<body>

    <div id="map"></div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://api.mapbox.com/mapbox.js/plugins/leaflet-omnivore/v0.3.1/leaflet-omnivore.min.js"></script>

<script>
        // 1. CREAMOS LAS CAPAS MAPA BASE (Sin añadirlas al mapa aún)
        
        // Capa 1: OpenStreetMap (Carreteras)
        const osmLayer = L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            attribution: '© OpenStreetMap contributors'
        });

        // Capa 2: Esri World Imagery (Satélite / Ortofotografía)
        const satelliteLayer = L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}', {
            attribution: 'Tiles &copy; Esri &mdash; Source: Esri, i-cubed, USDA, USGS, AEX, GeoEye, Getmapping, Aerogrid, IGN, IGP, UPR-EGP, and the GIS User Community'
        });

        // 2. INICIALIZAMOS EL MAPA (Establecemos OpenStreetMap como capa por defecto)
        const map = L.map('map', {
            center: [0, 0],
            zoom: 2,
            layers: [osmLayer] // Capa inicial
        });

        // 3. CONFIGURAMOS EL SELECTOR DE CAPAS (Menú flotante arriba a la derecha)
        const baseMaps = {
            "Mapa de Carreteras": osmLayer,
            "Vista Satélite": satelliteLayer
        };

        // Añadimos el control al mapa
        L.control.layers(baseMaps, null, { collapsed: false }).addTo(map);


        // 4. CARGAMOS TU ARCHIVO KML (Igual que antes)
        const kmlLayer = omnivore.kml("PRSKeys.kml")
            .on('ready', function() {
                map.fitBounds(kmlLayer.getBounds());

                kmlLayer.eachLayer(function(layer) {
                    if (layer.feature && layer.feature.properties) {
                        const props = layer.feature.properties;
                        const name = props.name || props.Name || props.title || "Punto sin nombre";
                        const description = props.description || props.Description || "";

                        let lat, lng;
                        if (layer.getLatLng) { 
                            lat = layer.getLatLng().lat;
                            lng = layer.getLatLng().lng;
                        } else if (layer.getBounds) { 
                            lat = layer.getBounds().getCenter().lat;
                            lng = layer.getBounds().getCenter().lng;
                        }

                        // Enlace a Google Maps
                        const googleMapsUrl = `https://www.google.com/maps/dir/?api=1&destination=${lat},${lng}`;
                        
                        const directionsLink = `<br><br><a href="${googleMapsUrl}" target="_blank" style="
                            display: inline-block; 
                            background-color: #1a73e8; 
                            color: white; 
                            padding: 5px 10px; 
                            text-decoration: none; 
                            border-radius: 4px; 
                            font-size: 12px; 
                            font-weight: bold;
                        ">📍 ¿Cómo llegar?</a>`;

                        const popupContent = `<strong>${name}</strong>${description ? '<br><br>' + description : ''}${directionsLink}`;
                        layer.bindPopup(popupContent);
                    }
                });
            })
            .on('error', function(e) {
                console.error("Error crítico cargando el archivo KML:", e);
            })
            .addTo(map);
    </script>
</body>
</html>

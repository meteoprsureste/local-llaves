<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mi Mapa de Localizaciones</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        html, body, #map { margin: 0; padding: 0; width: 100%; height: 100%; }
    </style>
</head>
<body>

    <div id="map"></div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://api.mapbox.com/mapbox.js/plugins/leaflet-omnivore/v0.3.1/leaflet-omnivore.min.js"></script>

    <script>
        const map = L.map('map').setView([0, 0], 2);

        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            attribution: '&copy; OpenStreetMap contributors'
        }).addTo(map);

        // Cargamos el KML usando Omnivore
        const kmlLayer = omnivore.kml("PRSKeys.kml")
            .on('ready', function() {
                map.fitBounds(kmlLayer.getBounds());

                kmlLayer.eachLayer(function(layer) {
                    if (layer.feature && layer.feature.properties) {
                        const props = layer.feature.properties;
                        const name = props.name || props.Name || props.title || "Punto sin nombre";
                        const description = props.description || props.Description || "";

                        // --- NUEVO: OBTENER COORDENADAS PARA GOOGLE MAPS ---
                        // Leaflet guarda las coordenadas de forma diferente si es un punto (marker) o una línea/polígono
                        let lat, lng;
                        if (layer.getLatLng) { 
                            // Si es un marcador simple
                            lat = layer.getLatLng().lat;
                            lng = layer.getLatLng().lng;
                        } else if (layer.getBounds) { 
                            // Si es una línea o área, usamos el centro geométrico
                            lat = layer.getBounds().getCenter().lat;
                            lng = layer.getBounds().getCenter().lng;
                        }

                        // Creamos el enlace a Google Maps usando la API de direcciones (?api=1&destination=...)
                        const googleMapsUrl = `https://www.google.com/maps/dir/?api=1&destination=${lat},${lng}`;
                        
                        // Diseñamos el botón de "¿Cómo llegar?" con un estilo sencillo
                        const directionsLink = `<br><br><a href="${googleMapsUrl}" target="_blank" style="
                            display: inline-block; 
                            background-color: #1a73e8; 
                            color: white; 
                            padding: 5px 10px; 
                            text-decoration: none; 
                            border-radius: 4px; 
                            font-size: 12px; 
                            font-weight: bold;
                        ">📍 ¿Cómo llegar?</a>`;

                        // Juntamos todo el contenido en el pop-up
                        const popupContent = `<strong>${name}</strong>${description ? '<br><br>' + description : ''}${directionsLink}`;
                        layer.bindPopup(popupContent);
                    }
                });
            })
            .on('error', function(e) {
                console.error("Error crítico cargando el archivo KML:", e);
            })
            .addTo(map);
    </script>
</body>
</html>
